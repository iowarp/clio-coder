name: Bug report
description: Report reproducible Clio Coder behavior.
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduce
      description: Minimal commands, config shape, or session steps.
      placeholder: |
        clio doctor
        clio targets
        clio run --agent scout "..."
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Output of `clio --version`, `node --version`, OS, shell, target id, runtime, and model.
      render: text
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: clio doctor output
      description: Paste the output of `clio doctor` (without `--fix`). Redact any secrets.
      render: text
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and receipt
      description: Paste only the relevant log lines, plus the receipt id from `<dataDir>/receipts/<runId>.json` if a run was involved. Remove API keys and private source.
      render: text

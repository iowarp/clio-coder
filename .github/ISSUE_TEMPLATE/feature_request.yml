name: Feature request
description: Propose a focused capability or developer workflow.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: What concrete user or agent workflow is blocked or awkward today? Describe the problem before the solution.
    validations:
      required: true
  - type: textarea
    id: shape
    attributes:
      label: Proposed shape
      description: Which surface changes? CLI, TUI, runtime, provider, session, docs, or test surface. Sketch the command, flag, or tool name if you have one.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete checks a reviewer can apply.
      placeholder: |
        - Command exits 0 on the documented happy path.
        - Existing settings.yaml continues to load without migration.
        - A unit or integration test covers the changed path.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out, and why.

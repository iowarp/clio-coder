name: ci

on:
  push:
    branches: [main, "v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install fd-find and ripgrep
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fd-find ripgrep
      - run: npm ci --prefer-offline --no-audit --no-fund
      - run: npm run ci:release
      - name: Repeat smoke and boundary lane
        if: matrix.node-version == 24
        run: npm run test:repeat
      - name: Coverage summary
        if: matrix.node-version == 24
        run: |
          npm run test:coverage | tee coverage.txt
          {
            echo "### Coverage summary"
            echo '```'
            sed -n '/start of coverage report/,/end of coverage report/p' coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

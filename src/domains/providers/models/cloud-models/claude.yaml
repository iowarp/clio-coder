# Source: https://docs.anthropic.com/en/docs/about-claude/models and
# https://www.anthropic.com/news (Claude 4.5, 4.6, 4.7 release notes).
# Extended thinking is available on Opus and Sonnet 4.5+ per the Anthropic API docs.
- family: claude-opus
  matchPatterns:
    - claude-opus
    - claude-opus-4
    - claude-opus-4-5
    - claude-opus-4-6
    - claude-opus-4-7
  capabilities:
    chat: true
    tools: true
    toolCallFormat: anthropic
    reasoning: true
    thinkingFormat: anthropic-extended
    vision: true
    audio: false
    embeddings: false
    rerank: false
    fim: false
    contextWindow: 200000
    maxTokens: 8192

- family: claude-sonnet
  matchPatterns:
    - claude-sonnet
    - claude-sonnet-4
    - claude-sonnet-4-5
    - claude-sonnet-4-6
    - claude-sonnet-4-7
  capabilities:
    chat: true
    tools: true
    toolCallFormat: anthropic
    reasoning: true
    thinkingFormat: anthropic-extended
    vision: true
    audio: false
    embeddings: false
    rerank: false
    fim: false
    contextWindow: 200000
    maxTokens: 8192

- family: claude-haiku
  matchPatterns:
    - claude-haiku
    - claude-haiku-4
    - claude-haiku-4-5
  capabilities:
    chat: true
    tools: true
    toolCallFormat: anthropic
    reasoning: true
    thinkingFormat: anthropic-extended
    vision: true
    audio: false
    embeddings: false
    rerank: false
    fim: false
    contextWindow: 200000
    maxTokens: 8192

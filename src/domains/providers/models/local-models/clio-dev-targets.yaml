# This knowledge base is intentionally narrow. It describes only the local
# models used for Clio self-development and leaves cloud GPT models to pi-ai's
# native OpenAI and openai-codex catalogs.
- family: qwen3.5-35b-a3b
  matchPatterns:
    - qwen3.5-35b-a3b
    - qwen3_5-35b-a3b
    - qwen3-5-35b-a3b
    - qwen3.5-35b
    - qwen3.5-35b-a3b-ud
  capabilities:
    chat: true
    tools: true
    toolCallFormat: qwen
    reasoning: true
    thinkingFormat: qwen-chat-template
    structuredOutputs: json-schema
    vision: true
    audio: false
    embeddings: false
    rerank: false
    fim: false
    contextWindow: 262144
    maxTokens: 65536
  quirks:
    serving: "Prefer an OpenAI-compatible endpoint with qwen3 reasoning and qwen3_coder tool parsing enabled."


      lmstudioNative: "Verified path. Channel-marker handler in clio's adapter recovers reasoning tokens that the SDK classifier drops."
      openaiCompat: "Fallback; reasoning_content is absent from the openai-compat reasoning probe for this family."
    thinking:
      mechanism: always-on
      guidance: |
        Distilled traces emit unconditionally. The thinking level setting is
        ignored at the API surface; chain-of-thought arrives whether or not
        Clio asks for it. Reasoning tokens are accounted via the channel-marker
        re-classifier in lmstudio-native.

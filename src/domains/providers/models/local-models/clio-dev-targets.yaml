# Sources:
# https://huggingface.co/Qwen/Qwen3.6-35B-A3B
# https://huggingface.co/Qwen/Qwen3.6-27B
# https://huggingface.co/google/gemma-4-26B-A4B
# https://huggingface.co/nvidia/Nemotron-Cascade-2-30B-A3B
# https://huggingface.co/unsloth/NVIDIA-Nemotron-3-Nano-Omni-30B-A3B-Reasoning-GGUF
# https://huggingface.co/mradermacher/Qwen3.5-35B-A3B-Claude-4.6-Opus-Reasoning-Distilled-i1-GGUF
#
# This knowledge base is intentionally narrow. It describes only the local
# models used for Clio self-development and leaves cloud GPT models to pi-ai's
# native OpenAI and openai-codex catalogs.
#
# Thinking semantics for these local families: the chain-of-thought is emitted
# by the model's chat template (Qwen-style <think> blocks, Gemma 4 thinking
# template, Nemotron reasoning template). LM Studio's SDK and llama.cpp's
# OpenAI-compatible surface do not expose a reliable "no thinking" flag, so
# Clio cannot disable template-driven reasoning at the API layer. With
# `--thinking off` Clio simply does not request reasoning; if the model emits
# it anyway, the chain-of-thought is captured into a ThinkingContent block,
# counted as reasoning tokens (separate from output tokens) on the receipt
# and TUI footer, and surfaced to the user truthfully rather than hidden.
- family: nemotron-3-nano-omni-30b-a3b-reasoning
  matchPatterns:
    - nvidia-nemotron-3-nano-omni-30b-a3b-reasoning
    - nemotron-3-nano-omni-30b-a3b-reasoning-ud-q4_k_m
    - nemotron-3-nano-omni-30b-a3b-reasoning
    - nemotron-3-nano-omni
    - nemotron-nano-omni
  capabilities:
    chat: true
    tools: true
    toolCallFormat: qwen
    reasoning: true
    thinkingFormat: qwen-chat-template
    structuredOutputs: json-schema
    vision: true
    audio: true
    embeddings: false
    rerank: false
    fim: false
    contextWindow: 1048576
    maxTokens: 131072
  quirks:
    sampling:
      thinking:
        temperature: 0.6
        topP: 0.95
        topK: 20
        maxTokens: 20480
        reasoningBudget: 16384
        gracePeriod: 1024
      instruct:
        temperature: 0.2
        topK: 1
        maxTokens: 1024
    gpuTiers:
      "24gb": "Use a 4-bit quant with reduced load context for evaluation. Prefer the 32GB tier for sustained Clio writes."
      "32gb": "Primary strong local model for multimodal main-agent work. Keep openai-compat available for tool-call fallback."
    runtimePreference:
      lmstudioNative: "Use only when the endpoint lifecycle is Clio-managed or the model is already loaded at the requested context."
      openaiCompat: "Preferred fallback for LM Studio gateway tool-call extraction."
      llamaCpp: "OpenAI-compatible chat completions with --jinja."
    llamaCpp:
      ctxSize: 819200
      cacheTypeK: q8_0
      cacheTypeV: q8_0
      flashAttn: true
      nGpuLayers: 99
      parallel: 4
    serving: "Use qwen3_coder tool parsing when served through OpenAI-compatible HTTP. LM Studio native uses SDK rawTools, but openai-compat remains the fallback for template-specific tool extraction issues."


# Source: https://huggingface.co/meta-llama (Llama 3, 3.1, 3.2, 3.3 model cards).
# Context windows: 128K for 3.1+ (8B / 70B / 405B), 8K for the 3.0 release.
# Vision only on Llama-3.2-Vision (11B / 90B) per https://huggingface.co/meta-llama/Llama-3.2-11B-Vision-Instruct.
- family: llama3
  matchPatterns:
    - llama-3
    - llama3
    - llama-3.1
    - llama3.1
    - llama-3.2
    - llama3.2
    - llama-3.3
    - llama3.3
    - meta-llama-3
  capabilities:
    chat: true
    tools: true
    toolCallFormat: llama3-json
    reasoning: false
    vision: false
    audio: false
    embeddings: false
    rerank: false
    fim: false
    contextWindow: 131072
    maxTokens: 8192

- family: llama-3.2-vision
  matchPatterns:
    - llama-3.2-vision
    - llama3.2-vision
    - llama-3.2-11b-vision
    - llama-3.2-90b-vision
  capabilities:
    chat: true
    tools: true
    toolCallFormat: llama3-json
    reasoning: false
    vision: true
    audio: false
    embeddings: false
    rerank: false
    fim: false
    contextWindow: 131072
    maxTokens: 8192

# Source: https://ai.meta.com/blog/llama-4-multimodal-intelligence/ and
# https://huggingface.co/meta-llama (Llama-4 Scout / Maverick cards).
# Scout ships with a 10M native context window; Maverick advertises 1M.
# Reasoning is not a first-class knob on Llama-4 at time of writing (April 2026).
- family: llama4-scout
  matchPatterns:
    - llama-4-scout
    - llama4-scout
    - scout-17b
  capabilities:
    chat: true
    tools: true
    toolCallFormat: llama3-json
    reasoning: false
    vision: true
    audio: false
    embeddings: false
    rerank: false
    fim: false
    contextWindow: 10000000
    maxTokens: 8192

- family: llama4-maverick
  matchPatterns:
    - llama-4-maverick
    - llama4-maverick
    - maverick-128e
  capabilities:
    chat: true
    tools: true
    toolCallFormat: llama3-json
    reasoning: false
    vision: true
    audio: false
    embeddings: false
    rerank: false
    fim: false
    contextWindow: 1000000
    maxTokens: 8192

- family: llama4-behemoth
  matchPatterns:
    - llama-4-behemoth
    - llama4-behemoth
  capabilities:
    chat: true
    tools: true
    toolCallFormat: llama3-json
    reasoning: false
    vision: true
    audio: false
    embeddings: false
    rerank: false
    fim: false
    contextWindow: 1000000
    maxTokens: 8192
